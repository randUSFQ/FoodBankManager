<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Food Bank Manager</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#e8dcc8;font-family:sans-serif}
canvas{display:block;cursor:pointer}
#dev{position:fixed;top:4px;left:4px;color:#0f0;font:12px monospace;display:none;z-index:99;pointer-events:none}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#e8dcc8;z-index:100;
  font:22px sans-serif;color:#8b6914;flex-direction:column;gap:16px}
#loading .spinner{width:40px;height:40px;border:4px solid #d4b87a;border-top-color:#8b6914;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div>Loading Food Bank Manager...</div>
<canvas id="c"></canvas>
<div id="dev"></div>
<script type="module">
import { STR } from "./strings.js";

// ─── ASSET LOADING ───
const assetPaths = {
  bg: "./assets/foodbank-bg.png",
  shelf: "./assets/shelf-storage.png",
  donationBox: "./assets/donation-box.png",
  clientHappy: "./assets/client-happy.png",
  clientNeutral: "./assets/client-neutral.png",
  clientSad: "./assets/client-sad.png",
  foodCanned: "./assets/food-canned.png",
  foodProduce: "./assets/food-produce.png",
  foodDairy: "./assets/food-dairy.png",
  foodBread: "./assets/food-bread.png",
  foodMeat: "./assets/food-meat.png",
  foodDry: "./assets/food-dry.png",
  spoiled: "./assets/spoiled-badge.png",
  upgradeIcon: "./assets/upgrade-icon.png",
  coinIcon: "./assets/coin-icon.png",
  queueArea: "./assets/queue-area.png",
  scene: "./assets/foodbank-scene.png",
};
const images = {};
let assetsLoaded = 0, assetsTotal = Object.keys(assetPaths).length;
function loadAssets(cb) {
  for (const [k, p] of Object.entries(assetPaths)) {
    const img = new Image();
    img.onload = img.onerror = () => { assetsLoaded++; if (assetsLoaded >= assetsTotal) cb(); };
    img.src = p;
    images[k] = img;
  }
}

// ─── GAME DATA ───
const FOOD_TYPES = [
  { id: "canned", name: "Canned", color: "#e8633a", spark: "#f5a623", spoilDays: 7, emoji: "🥫" },
  { id: "produce", name: "Produce", color: "#4caf50", spark: "#81c784", spoilDays: 2, emoji: "🥬" },
  { id: "dairy", name: "Dairy", color: "#fff3e0", spark: "#ffcc80", spoilDays: 3, emoji: "🥛" },
  { id: "bread", name: "Bread", color: "#d4a04a", spark: "#f5d78e", spoilDays: 3, emoji: "🍞" },
  { id: "meat", name: "Meat", color: "#c77b6e", spark: "#e8a99e", spoilDays: 2, emoji: "🥩" },
  { id: "dry", name: "Dry Goods", color: "#5c8db5", spark: "#90caf9", spoilDays: 5, emoji: "📦" },
];

const CLIENT_TYPES = [
  { name: "Single", size: 1, restrictChance: 0.15, color: "#6d9dc5" },
  { name: "Couple", size: 2, restrictChance: 0.2, color: "#7dab8e" },
  { name: "Family", size: 3, restrictChance: 0.25, color: "#c58b6d" },
  { name: "Senior", size: 1, restrictChance: 0.35, color: "#a07db5" },
];

const RESTRICTIONS = [
  { name: "No dairy", check: ft => ft.id === "dairy", strKey: "noDairy" },
  { name: "No gluten", check: ft => ft.id === "bread" || ft.id === "dry", strKey: "noGluten" },
  { name: "No meat", check: ft => ft.id === "meat", strKey: "noMeat" },
];

const UPGRADES = [
  { id: "shelf", baseCost: 30, costMult: 1.8, maxLvl: 5, bonus: 4, strKey: "shelfSpace", descKey: "shelfSpaceDesc" },
  { id: "fridge", baseCost: 40, costMult: 1.7, maxLvl: 4, bonus: 1, strKey: "fridge", descKey: "fridgeDesc" },
  { id: "volunteers", baseCost: 25, costMult: 1.6, maxLvl: 5, bonus: 1.3, strKey: "volunteers", descKey: "volunteersDesc" },
];

// ─── GAME STATE ───
let G = null;
let SEED = 42;
function seededRand() { SEED = (SEED * 16807) % 2147483647; return (SEED - 1) / 2147483646; }
function randInt(min, max) { return Math.floor(seededRand() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(seededRand() * arr.length)]; }

function newGame() {
  SEED = Math.floor(Math.random() * 99999) + 1;
  G = {
    day: 1,
    score: 0,
    totalServed: 0,
    totalUnsatisfied: 0,
    consecutiveUnsatisfied: 0,
    phase: "TITLE", // TITLE, MORNING, SERVICE, NIGHT, UPGRADE, GAMEOVER
    inventory: FOOD_TYPES.map(() => ({ qty: 0, daysLeft: [] })),
    maxInventory: 20,
    clients: [],
    currentClient: null,
    parcel: [],
    patienceTimer: 0,
    maxPatience: 15,
    dayTimer: 0,
    dayLength: 45,
    donations: FOOD_TYPES.map(() => 0),
    upgrades: UPGRADES.map(() => 0),
    totalFoodWasted: 0,
    spoiledThisTurn: [],
    servedToday: 0,
    unsatisfiedToday: 0,
    phaseTransition: 0,
    particles: [],
    message: null,
    messageTimer: 0,
    highScore: parseInt(localStorage.getItem("foodbankHS") || "0"),
    comboCount: 0,
    animationTimer: 0,
    upgradeAvailable: false,
  };
}

// ─── FOOD MANAGEMENT ───
function addFood(typeIdx, qty) {
  const inv = G.inventory[typeIdx];
  const room = G.maxInventory - inv.qty;
  const actual = Math.min(qty, room);
  for (let i = 0; i < actual; i++) inv.daysLeft.push(FOOD_TYPES[typeIdx].spoilDays);
  inv.qty += actual;
  return actual;
}

function removeFood(typeIdx) {
  const inv = G.inventory[typeIdx];
  if (inv.qty <= 0) return false;
  inv.daysLeft.shift();
  inv.qty--;
  return true;
}

function processSpoilage() {
  G.spoiledThisTurn = [];
  for (let i = 0; i < FOOD_TYPES.length; i++) {
    const inv = G.inventory[i];
    const fridgeLvl = G.upgrades[1];
    const bonus = fridgeLvl * UPGRADES[1].bonus;
    const newLeft = [];
    for (const d of inv.daysLeft) {
      if (d - 1 <= 0) {
        G.totalFoodWasted++;
        G.spoiledThisTurn.push(i);
      } else {
        newLeft.push(d - 1);
      }
    }
    inv.daysLeft = newLeft;
    inv.qty = newLeft.length;
  }
}

function generateDonations() {
  const base = Math.min(4 + G.day, 12);
  const dayOfWeek = G.day % 7;
  // Weekends = more produce
  const produceBonus = (dayOfWeek >= 5) ? 2 : 0;
  G.donations = FOOD_TYPES.map((ft, i) => {
    let count = randInt(1, 3);
    if (i === 1) count += produceBonus; // produce
    if (i === 0) count += randInt(0, 1); // canned
    return count;
  });
}

// ─── CLIENT GENERATION ───
function spawnClient() {
  const ct = pick(CLIENT_TYPES);
  const needs = [];
  const needCount = Math.min(ct.size + randInt(0, 1), 4);
  const available = FOOD_TYPES.map((_, i) => i);
  for (let i = 0; i < needCount && available.length > 0; i++) {
    const idx = randInt(0, available.length - 1);
    needs.push(available[idx]);
    available.splice(idx, 1);
  }
  let restriction = null;
  if (seededRand() < ct.restrictChance) {
    restriction = pick(RESTRICTIONS);
    // Remove restricted foods from needs
    for (let i = needs.length - 1; i >= 0; i--) {
      if (restriction.check(FOOD_TYPES[needs[i]])) needs.splice(i, 1);
    }
    if (needs.length === 0) needs.push(randInt(0, FOOD_TYPES.length - 1));
  }
  return {
    type: ct,
    needs,
    restriction,
    patience: G.maxPatience,
    satisfied: false,
    state: "waiting", // waiting, serving, leaving
    animX: 0,
    animY: 0,
    scale: 1,
    mood: "neutral",
    servedFoods: [],
  };
}

// ─── RENDER HELPERS ───
const W = 800, H = 600;
let W_VIRT = W, H_VIRT = H;

function drawRoundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawFoodIcon(ctx, idx, cx, cy, size, alpha) {
  ctx.globalAlpha = alpha || 1;
  const ft = FOOD_TYPES[idx];
  const r = size / 2;
  // Food circle with gradient
  const grad = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, 0, cx, cy, r);
  grad.addColorStop(0, ft.spark);
  grad.addColorStop(1, ft.color);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.15)";
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawClientSprite(ctx, cx, cy, size, mood, restriction) {
  const s = size;
  ctx.save();
  // Body
  const colors = { happy: "#6dab7a", neutral: "#7dab8e", sad: "#a07db5" };
  const bodyCol = colors[mood] || colors.neutral;
  // Shadow
  ctx.beginPath();
  ctx.ellipse(cx, cy + s*0.45, s*0.4, s*0.08, 0, 0, Math.PI*2);
  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.fill();
  // Body (rounded rectangle)
  drawRoundRect(ctx, cx - s*0.28, cy - s*0.15, s*0.56, s*0.5, s*0.15, bodyCol, "#5a7a6a");
  // Head
  ctx.beginPath();
  ctx.arc(cx, cy - s*0.25, s*0.2, 0, Math.PI*2);
  ctx.fillStyle = "#f5dcc4";
  ctx.fill();
  ctx.strokeStyle = "#c9a88a";
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Face
  if (mood === "happy") {
    ctx.beginPath();
    ctx.arc(cx - s*0.06, cy - s*0.28, s*0.03, 0, Math.PI*2);
    ctx.fillStyle = "#5a4a3a";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + s*0.06, cy - s*0.28, s*0.03, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy - s*0.18, s*0.07, 0.1, Math.PI - 0.1);
    ctx.strokeStyle = "#5a4a3a";
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else if (mood === "sad") {
    ctx.beginPath();
    ctx.arc(cx - s*0.06, cy - s*0.26, s*0.03, 0, Math.PI*2);
    ctx.fillStyle = "#5a4a3a";
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + s*0.06, cy - s*0.26, s*0.03, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx, cy - s*0.14, s*0.06, Math.PI + 0.2, -0.2);
    ctx.strokeStyle = "#5a4a3a";
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else {
    ctx.fillStyle = "#5a4a3a";
    ctx.beginPath();
    ctx.arc(cx - s*0.06, cy - s*0.27, s*0.025, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + s*0.06, cy - s*0.27, s*0.025, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx - s*0.04, cy - s*0.18);
    ctx.lineTo(cx + s*0.04, cy - s*0.18);
    ctx.strokeStyle = "#5a4a3a";
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
  // Restriction badge
  if (restriction) {
    ctx.beginPath();
    ctx.arc(cx + s*0.2, cy - s*0.35, s*0.07, 0, Math.PI*2);
    ctx.fillStyle = "#e53935";
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = `${s*0.09}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("!", cx + s*0.2, cy - s*0.35);
  }
  // Bright accessory (one colored dot)
  const accColors = ["#ff6b6b", "#ffd93d", "#6bcb77", "#4d96ff", "#ff8fab"];
  ctx.beginPath();
  ctx.arc(cx + s*0.15, cy + s*0.15, s*0.035, 0, Math.PI*2);
  ctx.fillStyle = accColors[(G ? G.day : 1) % accColors.length];
  ctx.fill();
  ctx.restore();
}

// ─── SCREENS ───
function drawTitleScreen(ctx) {
  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H_VIRT);
  grad.addColorStop(0, "#f5e6c8");
  grad.addColorStop(1, "#d4b87a");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W_VIRT, H_VIRT);

  // Decorative background elements
  for (let i = 0; i < 6; i++) {
    const x = (i * 137 + 23) % W_VIRT;
    const y = (i * 89 + 57) % H_VIRT;
    const idx = i % FOOD_TYPES.length;
    drawFoodIcon(ctx, idx, x, y, 18 + i * 2, 0.25);
  }

  // Title box
  const cx = W_VIRT / 2;
  drawRoundRect(ctx, cx - 220, 80, 440, 140, 20, "rgba(255,255,255,0.85)", "#c9a04a");
  ctx.fillStyle = "#5a3e1b";
  ctx.font = "bold 40px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(STR.title, cx, 126);
  ctx.fillStyle = "#8b6914";
  ctx.font = "16px sans-serif";
  ctx.fillText(STR.subtitle, cx, 170);

  // Stats
  drawRoundRect(ctx, cx - 200, 240, 400, 70, 14, "rgba(255,255,255,0.6)", "#c9a04a");
  ctx.fillStyle = "#5a3e1b";
  ctx.font = "14px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(`${STR.highScore}: ${G.highScore}`, cx, 260);
  ctx.font = "13px sans-serif";
  ctx.fillStyle = "#7a6a4a";
  ctx.fillText(STR.gameGoal, cx, 290);

  // Start button
  const btnY = 350;
  const pulse = Math.sin(Date.now() / 400) * 0.05 + 1;
  drawRoundRect(ctx, cx - 120, btnY, 240, 60, 30,
    `rgba(107, 171, 74, ${0.8 + (pulse - 1) * 2})`, "#4a8a3a");
  ctx.fillStyle = "#fff";
  ctx.font = "bold 22px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(STR.startDay, cx, btnY + 30);

  // Food bank illustration
  const bankY = 460;
  // Building
  drawRoundRect(ctx, cx - 100, bankY, 200, 100, 10, "#dcc8a0", "#c9a04a");
  // Roof
  ctx.beginPath();
  ctx.moveTo(cx - 120, bankY);
  ctx.lineTo(cx, bankY - 40);
  ctx.lineTo(cx + 120, bankY);
  ctx.closePath();
  ctx.fillStyle = "#c9583a";
  ctx.fill();
  ctx.strokeStyle = "#a84a2a";
  ctx.lineWidth = 2;
  ctx.stroke();
  // Door
  drawRoundRect(ctx, cx - 20, bankY + 50, 40, 50, 5, "#6d9dc5");
  // Windows
  for (let i = -1; i <= 1; i += 2) {
    drawRoundRect(ctx, cx + i * 50 - 12, bankY + 10, 24, 24, 4, "#fff7e8", "#c9a04a");
  }
  ctx.fillStyle = "#5a3e1b";
  ctx.font = "11px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(STR.foodBank, cx, bankY + 95);

  // Version / credits
  ctx.fillStyle = "#a09070";
  ctx.font = "11px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("Built for Higgsfield Game Jam", cx, H_VIRT - 16);
}

function drawMorningPhase(ctx) {
  // Background
  ctx.fillStyle = "#f5e6c8";
  ctx.fillRect(0, 0, W_VIRT, H_VIRT);

  // Header
  const dayStr = `${STR.day} ${G.day}`;
  ctx.fillStyle = "#5a3e1b";
  ctx.font = "bold 28px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText(dayStr, W_VIRT / 2, 12);

  ctx.fillStyle = "#8b6914";
  ctx.font = "16px sans-serif";
  ctx.fillText(STR.phaseMorning, W_VIRT / 2, 46);

  // Donation truck visual
  const truckY = 80;
  ctx.save();
  // Truck body
  drawRoundRect(ctx, W_VIRT / 2 - 100, truckY, 200, 70, 10, "#8b6d4a", "#6a4f30");
  // Truck cab
  drawRoundRect(ctx, W_VIRT / 2 - 120, truckY + 10, 30, 50, 8, "#5c8db5", "#3a6a8a");
  // Wheels
  ctx.beginPath();
  ctx.arc(W_VIRT / 2 - 75, truckY + 75, 12, 0, Math.PI*2);
  ctx.fillStyle = "#3a3a3a";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(W_VIRT / 2 + 60, truckY + 75, 12, 0, Math.PI*2);
  ctx.fillStyle = "#3a3a3a";
  ctx.fill();
  // "FOOD" on truck
  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("FOOD", W_VIRT / 2, truckY + 35);
  ctx.restore();

  // Donation items
  const cols = 6;
  const spacing = 90;
  const startX = (W_VIRT - (cols - 1) * spacing) / 2;
  const itemsY = 190;

  ctx.fillStyle = "#5a3e1b";
  ctx.font = "14px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText(`${STR.donation}`, W_VIRT / 2, itemsY - 20);

  for (let i = 0; i < FOOD_TYPES.length; i++) {
    const x = startX + i * spacing;
    const qty = G.donations[i];
    if (qty <= 0) continue;
    drawFoodIcon(ctx, i, x, itemsY + 20, 28, 1);
    // Count badge
    ctx.fillStyle = "#5a3e1b";
    ctx.font = "bold 14px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.fillText(`+${qty}`, x, itemsY + 55);
  }

  // Continue prompt
  const btnY = 310;
  const pulse = Math.sin(Date.now() / 500) * 0.03 + 1;
  drawRoundRect(ctx, W_VIRT / 2 - 100, btnY, 200, 50, 25, "rgba(107,171,74,0.85)", "#4a8a3a");
  ctx.fillStyle = "#fff";
  ctx.font = "bold 18px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(STR.continue_, W_VIRT / 2, btnY + 25);

  // Current inventory summary
  ctx.fillStyle = "#5a3e1b";
  ctx.font = "13px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText(`${STR.inventory}: ${G.inventory.reduce((a, b) => a + b.qty, 0)}/${G.maxInventory}`, W_VIRT / 2, 380);

  // Score display
  ctx.fillStyle = "#7a6a4a";
  ctx.font = "12px sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.fillText(`${STR.score}: ${G.score}  |  ${STR.served}: ${G.totalServed}`, 12, 12);
}

function drawServicePhase(ctx) {
  // Background
  ctx.fillStyle = "#f0e2c8";
  ctx.fillRect(0, 0, W_VIRT, H_VIRT);

  // Decorative floor lines
  ctx.strokeStyle = "rgba(180,160,120,0.3)";
  ctx.lineWidth = 1;
  for (let i = 1; i < 6; i++) {
    const y = (H_VIRT * i) / 6;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W_VIRT, y); ctx.stroke();
  }

  // Header bar
  ctx.fillStyle = "rgba(90,62,27,0.9)";
  ctx.fillRect(0, 0, W_VIRT, 40);
  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillText(`${STR.day} ${G.day}`, 12, 20);
  ctx.textAlign = "right";
  ctx.fillText(`${STR.score}: ${G.score}`, W_VIRT - 12, 20);

  // Client queue area (left side)
  const queueX = 40;
  const queueStartY = 90;
  const clientSpacing = 95;

  // Show clients in queue
  for (let i = 0; i < G.clients.length; i++) {
    const c = G.clients[i];
    const cy = queueStartY + i * clientSpacing;
    // Queue line marker
    if (i === 0) {
      ctx.strokeStyle = "rgba(180,160,120,0.4)";
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(queueX + 20, cy + 40);
      ctx.lineTo(queueX + 20, cy + 40 + 30);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    const isCurrent = i === 0 && G.currentClient;
    const alpha = isCurrent ? 1 : 0.5;
    ctx.globalAlpha = alpha;
    drawClientSprite(ctx, queueX + 22, cy, 34, c === G.currentClient ? c.mood : "neutral", c.restriction);

    // Need icons for current client
    if (isCurrent) {
      const needs = G.currentClient.needs;
      for (let j = 0; j < needs.length; j++) {
        const ix = queueX + 50 + j * 28;
        drawFoodIcon(ctx, needs[j], ix, cy - 10, 12, 1);
        // Check if this need is already served
        if (G.currentClient.servedFoods.includes(needs[j])) {
          ctx.strokeStyle = "#4caf50";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(ix, cy - 10, 8, 0, Math.PI*2);
          ctx.stroke();
        }
      }
    }

    // Client name / size
    ctx.fillStyle = isCurrent ? "#5a3e1b" : "#a09070";
    ctx.font = "11px sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    const sizeLabel = c.type.size > 1 ? ` (×${c.type.size})` : "";
    ctx.fillText(`${c.type.name}${sizeLabel}`, queueX + 50, cy + 8);
    ctx.globalAlpha = 1;
  }

  // Current client serving area (center-right)
  if (G.currentClient) {

// ─── GAME LOGIC ───
function phaseTick(dt) {
  if (G.phase === "MORNING") {
    G.phaseTimer += dt;
    G.animationTimer += dt;
  } else if (G.phase === "SERVICE") {
    G.phaseTimer += dt;
    G.animationTimer += dt;

    if (G.currentClient) {
      G.currentClient.patience -= dt / 1000;
      if (G.currentClient.patience <= 0) {
        clientLeaves();
      }
    }

    // Spawn new clients (3 seconds apart)
    const spawnTimer = G.phaseTimer / 1000;
    if (G.clients.length < 5 && spawnTimer > 3 * (G.clients.length + 1)) {
      const c = spawnClient();
      G.clients.push(c);
      if (!G.currentClient) G.currentClient = c;
    }
  } else if (G.phase === "NIGHT") {
    G.animationTimer += dt;
  }
}

function clientLeaves() {
  const c = G.currentClient;
  if (!c) return;
  c.mood = "sad";
  G.unsatisfiedToday++;
  G.totalUnsatisfied++;
  G.consecutiveUnsatisfied++;
  G.comboCount = 0;

  // Remove from queue
  G.clients.shift();
  G.currentClient = G.clients.length > 0 ? G.clients[0] : null;

  if (G.consecutiveUnsatisfied >= 3) {
    G.phase = "GAMEOVER";
    if (G.score > G.highScore) {
      G.highScore = G.score;
      localStorage.setItem("foodbankHS", String(G.highScore));
    }
    return;
  }

  // Check if all clients served
  checkDayEnd();
}

function serveClient() {
  const c = G.currentClient;
  if (!c) return;

  // Check all needs are met
  const allMet = c.needs.every(n => c.servedFoods.includes(n));
  if (!allMet) return;

  c.mood = "happy";
  const bonus = G.comboCount > 0 ? Math.floor(G.comboCount * 2) : 0;
  const points = (c.type.size * 5) + c.needs.length * 3 + bonus;
  G.score += points;
  G.totalServed += c.type.size;
  G.servedToday += c.type.size;
  G.consecutiveUnsatisfied = 0;
  G.comboCount++;

  // Remove from queue
  G.clients.shift();
  G.currentClient = G.clients.length > 0 ? G.clients[0] : null;

  checkDayEnd();
}

function checkDayEnd() {
  // If no more clients and none coming, end day
  if (G.clients.length === 0) {
    G.phase = "NIGHT";
    processSpoilage();
  }
}

function addToParcel(typeIdx) {
  if (!G.currentClient) return;
  const c = G.currentClient;
  // Check if this type is needed
  if (!c.needs.includes(typeIdx)) return;
  // Check if already served
  if (c.servedFoods.includes(typeIdx)) return;
  // Check restriction
  if (c.restriction && c.restriction.check(FOOD_TYPES[typeIdx])) return;
  // Check inventory
  if (!removeFood(typeIdx)) return;
  c.servedFoods.push(typeIdx);
}

// ─── INPUT HANDLING ───
let clickHandlers = {};
const BIND = {};
const held = new Set();
addEventListener("keydown", e => { const c = BIND[e.code]; if (c) { held.add(c); e.preventDefault(); } });
addEventListener("keyup", e => { const c = BIND[e.code]; if (c) held.delete(c); });

const touch = new Set();
addEventListener("touchstart", e => { for (const t of e.changedTouches) touch.add("touch"); e.preventDefault(); }, { passive: false });
addEventListener("touchend", e => { touch.clear(); e.preventDefault(); }, { passive: false });

function handleClick(mx, my) {
  if (G.phase === "TITLE") {
    // Start button
    if (mx > W_VIRT / 2 - 120 && mx < W_VIRT / 2 + 120 && my > 350 && my < 410) {
      startNewDay();
    }
  } else if (G.phase === "MORNING") {
    // Continue button
    if (mx > W_VIRT / 2 - 100 && mx < W_VIRT / 2 + 100 && my > 310 && my < 360) {
      G.phase = "SERVICE";
      G.phaseTimer = 0;
      G.servedToday = 0;
      G.unsatisfiedToday = 0;
      // Spawn first clients
      G.clients = [];
      for (let i = 0; i < 3; i++) {
        G.clients.push(spawnClient());
      }
      G.currentClient = G.clients[0];
    }
  } else if (G.phase === "SERVICE") {
    handleServiceClick(mx, my);
  } else if (G.phase === "NIGHT") {
    // Next Day button
    if (mx > W_VIRT / 2 - 100 && mx < W_VIRT / 2 + 100 && my > H_VIRT * 0.35 + 80 && my < H_VIRT * 0.35 + 128) {
      G.upgradeAvailable = true;
      G.phase = "UPGRADE";
    }
  } else if (G.phase === "UPGRADE") {
    handleUpgradeClick(mx, my);
  } else if (G.phase === "GAMEOVER") {
    if (mx > W_VIRT / 2 - 100 && mx < W_VIRT / 2 + 100 && my > 340 && my < 390) {
      newGame();
    }
  }
}

function handleServiceClick(mx, my) {
  // Inventory food clicks
  const invY = H_VIRT - 130;
  const foodSpacing = Math.min(95, (W_VIRT - 40) / FOOD_TYPES.length);
  const foodStartX = (W_VIRT - (FOOD_TYPES.length - 1) * foodSpacing) / 2;

  for (let i = 0; i < FOOD_TYPES.length; i++) {
    const fx = foodStartX + i * foodSpacing;
    const fy = invY + 20;
    if (mx > fx && mx < fx + 36 && my > fy && my < fy + 60 && G.inventory[i].qty > 0) {
      addToParcel(i);
      return;
    }
  }

  // Serve button
  if (G.currentClient) {
    const serveX = 340;
    const serveY = 90;
    const allServed = G.currentClient.needs.every(n => G.currentClient.servedFoods.includes(n));
    if (G.currentClient.servedFoods.length > 0 && allServed) {
      const svX = serveX + 310;
      const svY = serveY + 30;
      if (mx > svX && mx < svX + 60 && my > svY && my < svY + 35) {
        serveClient();
        return;
      }
    }
  }
}

function handleUpgradeClick(mx, my) {
  const cardW = Math.min(220, (W_VIRT - 60) / 3);
  const gap = Math.min(20, (W_VIRT - cardW * 3) / 4);
  const startX = gap;

  for (let i = 0; i < UPGRADES.length; i++) {
    const up = UPGRADES[i];
    const lvl = G.upgrades[i];
    const x = startX + i * (cardW + gap) + gap * 0.5;
    const y = 80;
    const canBuy = lvl < up.maxLvl;
    if (!canBuy) continue;
    const cost = Math.floor(up.baseCost * Math.pow(up.costMult, lvl));
    const affordable = G.score >= cost;
    // Buy button area
    const btnX = x + 20;
    const btnY = y + 140;
    const btnW = cardW - 40;
    const btnH = 36;
    if (mx > btnX && mx < btnX + btnW && my > btnY && my < btnY + btnH && affordable) {
      G.score -= cost;
      G.upgrades[i]++;
      // Apply upgrade
      if (i === 0) G.maxInventory += UPGRADES[0].bonus;
      return;
    }
  }

  // Continue button
  const btnY = 330;
  if (mx > W_VIRT / 2 - 90 && mx < W_VIRT / 2 + 90 && my > btnY && my < btnY + 45) {
    startNewDay();
  }
}

function startNewDay() {
  if (G.phase === "GAMEOVER") return;
  G.day++;
  G.phase = "MORNING";
  G.phaseTimer = 0;
  G.animationTimer = 0;
  generateDonations();
  // Apply donations to inventory
  for (let i = 0; i < FOOD_TYPES.length; i++) {
    addFood(i, G.donations[i]);
  }
  // Auto-spoilage check at end of previous day already happened
  G.servedToday = 0;
  G.unsatisfiedToday = 0;
  G.comboCount = 0;
}

const canvas = document.getElementById("c"), ctx = canvas.getContext("2d");
const DPR_CAP = 1.5;

function resize() {
  const dpr = Math.min(devicePixelRatio || 1, DPR_CAP);
  canvas.width = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W_VIRT = Math.min(innerWidth, W);
  H_VIRT = Math.min(innerHeight, H);
}
addEventListener("resize", resize);
addEventListener("orientationchange", resize);
resize();

// ─── MAIN LOOP ───
const STEP = 1000 / 60;
let acc = 0, last = performance.now(), paused = false, frames = 0, fpsAt = last, fps = 0;
addEventListener("blur", () => paused = true);
addEventListener("focus", () => { paused = false; last = performance.now(); });

// Canvas click
canvas.addEventListener("click", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W_VIRT / rect.width);
  const my = (e.clientY - rect.top) * (H_VIRT / rect.height);
  handleClick(mx, my);
});

canvas.addEventListener("touchstart", e => {
  const rect = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) {
    const mx = (t.clientX - rect.left) * (W_VIRT / rect.width);
    const my = (t.clientY - rect.top) * (H_VIRT / rect.height);
    handleClick(mx, my);
    break; // one touch at a time
  }
}, { passive: true });

const dev = new URLSearchParams(location.search).has("dev");
if (dev) document.getElementById("dev").style.display = "block";

// Start
newGame();

let initComplete = false;
function frame(now) {
  requestAnimationFrame(frame);
  if (paused || !initComplete) return;
  acc += now - last; last = now;
  while (acc >= STEP) {
    phaseTick(STEP);
    acc -= STEP;
  }
  render();
  if (dev && (frames++, now - fpsAt >= 500)) {
    fps = Math.round(frames * 1000 / (now - fpsAt));
    frames = 0; fpsAt = now;
    document.getElementById("dev").textContent = fps + " fps";
  }
}

function render() {
  ctx.clearRect(0, 0, W_VIRT, H_VIRT);
  ctx.save();
  // Scale to fit
  const scaleX = innerWidth / W_VIRT;
  const scaleY = innerHeight / H_VIRT;
  const scale = Math.min(scaleX, scaleY);
  const offX = (innerWidth - W_VIRT * scale) / 2;
  const offY = (innerHeight - H_VIRT * scale) / 2;
  ctx.translate(offX, offY);
  ctx.scale(scale, scale);

  switch (G.phase) {
    case "TITLE": drawTitleScreen(ctx); break;
    case "MORNING": drawMorningPhase(ctx); break;
    case "SERVICE": drawServicePhase(ctx); break;
    case "NIGHT": drawNightPhase(ctx); break;
    case "UPGRADE": drawUpgradeScreen(ctx); break;
    case "GAMEOVER": drawGameOver(ctx); break;
  }

  ctx.restore();
}

// Initialize
loadAssets(() => {
  document.getElementById("loading").style.display = "none";
  initComplete = true;
  last = performance.now();
  requestAnimationFrame(frame);
});
</script>
</body>
